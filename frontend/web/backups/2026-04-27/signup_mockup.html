<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Linker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#451A03',
                        secondary: '#B45309',
                        accent: '#FDE68A',
                        background: '#FFFBEB',
                        surface: '#FFF8F0',
                        border: '#D6C4A8',
                        success: '#166534',
                        warning: '#D97706',
                        danger: '#991B1B',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body class="bg-background font-sans text-primary min-h-screen py-12 px-6 flex flex-col items-center">

    <div class="w-full max-w-2xl">
        <!-- Logo & Title -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 mb-4">
                <span class="w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center text-2xl font-black shadow-lg">L</span>
                <span class="text-2xl font-black tracking-tighter">Linker.</span>
            </div>
            <h1 class="text-3xl font-black mb-2">회원가입</h1>
            <p class="text-primary/60 font-medium text-sm">전문가와 기업의 신뢰를 연결하는 시작점입니다.</p>
        </div>

        <!-- Progress Steps -->
        <div class="flex items-center justify-between mb-12 px-4 relative">
            <div class="absolute top-1/2 left-0 w-full h-px bg-border/30 -z-10"></div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold ring-4 ring-background">1</div>
                <span class="text-[10px] font-bold text-primary">계정 정보</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-secondary text-white flex items-center justify-center text-xs font-bold ring-4 ring-background">2</div>
                <span class="text-[10px] font-bold text-secondary">본인 인증</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-white border border-border text-primary/30 flex items-center justify-center text-xs font-bold ring-4 ring-background">3</div>
                <span class="text-[10px] font-bold text-primary/30">가입 완료</span>
            </div>
        </div>

        <form class="bg-white rounded-[40px] border border-border/50 shadow-2xl p-10 md:p-12 space-y-10">
            
            <!-- Step 2 Section: Identity & Privacy -->
            <div class="space-y-6">
                <h2 class="text-sm font-black text-primary uppercase tracking-widest border-b border-border/20 pb-2">Step 2. 실명 인증 및 개인정보</h2>
                
                <!-- Identity Verification Button -->
                <div class="p-6 bg-surface/50 rounded-3xl border border-border/40 text-center">
                    <p class="text-xs font-bold text-primary/60 mb-4">신뢰할 수 있는 활동을 위해 본인 인증이 필요합니다.</p>
                    <button type="button" class="w-full py-4 bg-white border border-secondary text-secondary rounded-2xl font-black text-sm hover:bg-secondary hover:text-white transition-all shadow-md flex items-center justify-center gap-2">
                        📱 휴대폰 본인 확인 서비스 연동
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">성명 (실명) <span class="text-danger">*</span></label>
                        <input type="text" readonly placeholder="본인 인증 시 자동 입력" class="w-full px-5 py-3.5 rounded-xl border border-border bg-gray-100/50 outline-none text-sm font-bold text-primary/40 cursor-not-allowed" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">주소 정보 <span class="text-danger">*</span></label>
                        <div class="flex gap-2">
                            <input type="text" placeholder="우편번호" class="w-full px-5 py-3.5 rounded-xl border border-border bg-surface/30 outline-none text-sm" />
                            <button type="button" class="px-4 py-2 bg-primary text-white rounded-lg text-xs font-bold whitespace-nowrap">검색</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Step 3 Section: Expert Preferences -->
            <div class="space-y-8 bg-surface/30 p-8 rounded-[32px] border border-secondary/20">
                <h2 class="text-sm font-black text-primary uppercase tracking-widest border-b border-secondary/20 pb-2">Step 3. 전문가 활동 조건 설정</h2>
                
                <div class="space-y-6">
                    <!-- Rank / Level -->
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-3 uppercase">현재 직급 / 숙련도</label>
                        <div class="flex flex-wrap gap-2">
                            <button type="button" class="px-4 py-2 rounded-xl border border-secondary bg-secondary text-white text-xs font-bold">미들 (3~7년)</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-white text-xs font-bold text-primary/40">시니어 (7~12년)</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-white text-xs font-bold text-primary/40">리드 / 아키텍트</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-white text-xs font-bold text-primary/40">대표 / 파트너급</button>
                        </div>
                    </div>

                    <!-- Salary -->
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-3 uppercase">수행 가능 최소 금액 (월 기준)</label>
                        <div class="flex items-center gap-4">
                            <input type="range" class="flex-1 accent-secondary" min="300" max="1500" step="50" value="700" />
                            <span class="text-sm font-black text-secondary whitespace-nowrap">700만원 이상</span>
                        </div>
                        <p class="text-[10px] text-primary/40 mt-1">* 설정하신 금액 미만의 프로젝트는 매칭 제안이 발송되지 않습니다.</p>
                    </div>

                    <!-- Location -->
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-3 uppercase">근무 가능 지역 (중복 선택)</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only" checked />
                                <div class="py-2 text-center border border-border rounded-lg text-[11px] font-bold peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all">🏠 100% 원격</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only" checked />
                                <div class="py-2 text-center border border-border rounded-lg text-[11px] font-bold peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all">📍 서울 전체</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only" />
                                <div class="py-2 text-center border border-border rounded-lg text-[11px] font-bold peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all">📍 판교/분당</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="checkbox" class="peer sr-only" />
                                <div class="py-2 text-center border border-border rounded-lg text-[11px] font-bold peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-all">📍 기타 지역</div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Terms -->
            <div class="p-6 bg-white rounded-3xl border border-border/30 space-y-4">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" class="w-5 h-5 rounded border-border text-secondary focus:ring-secondary" checked />
                    <span class="text-sm font-bold text-primary">모든 약관 및 개인정보 활용에 동의합니다.</span>
                </label>
            </div>

            <!-- Submit -->
            <button type="button" onclick="location.href='linker_portal_mockup.html'" class="w-full py-5 bg-primary text-white rounded-2xl font-black text-lg shadow-2xl hover:bg-black hover:-translate-y-1 transition-all active:scale-[0.98]">
                Linker 가입 완료하기
            </button>
            
            <p class="text-center text-sm text-primary/40 font-medium">
                이미 계정이 있으신가요? <a href="login_mockup.html" class="text-secondary font-bold underline underline-offset-4">로그인하기</a>
            </p>
        </form>

        <div class="h-20"></div>
    </div>

</body>
</html>
