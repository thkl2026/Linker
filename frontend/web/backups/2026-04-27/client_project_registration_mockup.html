<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신규 프로젝트 공고 등록 - Linker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#451A03',
                        secondary: '#B45309',
                        accent: '#FDE68A',
                        background: '#FFFBEB',
                        surface: '#FFF8F0',
                        border: '#D6C4A8',
                        success: '#166534',
                        warning: '#D97706',
                        danger: '#991B1B',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body class="bg-background font-sans text-primary min-h-screen">
    
    <!-- Top Navigation -->
    <header class="bg-surface border-b border-border/50 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="main_mockup.html" class="text-primary/50 hover:text-primary transition-colors text-xl font-bold">←</a>
                <h1 class="text-lg font-bold text-primary">신규 프로젝트 등록 (공고)</h1>
            </div>
            <div class="flex items-center gap-3">
                <button class="px-4 py-2 rounded-xl border border-border text-sm font-bold text-primary/60 hover:bg-white transition-all">임시저장</button>
                <button class="px-6 py-2 rounded-xl bg-secondary text-white text-sm font-bold shadow-md hover:bg-amber-900 transition-all">공고 게시하기</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-black text-primary mb-3">찾으시는 전문가가 누구인가요?</h2>
            <p class="text-primary/60 font-medium leading-relaxed">상세한 정보를 입력할수록 딱 맞는 전문가를 만날 확률이 높아집니다.</p>
        </div>

        <form class="space-y-8">
            <!-- Basic Info Section -->
            <section class="bg-white rounded-3xl border border-border/50 shadow-sm p-8 space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-8 h-8 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">📋</span>
                    <h3 class="text-lg font-bold text-primary">기본 정보</h3>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2">프로젝트 제목 <span class="text-danger">*</span></label>
                        <input type="text" placeholder="예: 차세대 물류 관리 시스템 프론트엔드 개발자 모집" class="w-full px-5 py-3.5 rounded-xl border border-border focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-sm font-medium" />
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-primary mb-2">카테고리 <span class="text-danger">*</span></label>
                            <select class="w-full px-5 py-3.5 rounded-xl border border-border focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-sm font-medium bg-white appearance-none">
                                <option>개발 (Web/App)</option>
                                <option>디자인 (UI/UX)</option>
                                <option>기획 (PM/PO)</option>
                                <option>기타</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-primary mb-2">근무 형태 <span class="text-danger">*</span></label>
                            <div class="flex bg-surface p-1 rounded-xl border border-border/50">
                                <button type="button" class="flex-1 py-2.5 rounded-lg text-sm font-bold bg-white text-secondary shadow-sm">원격 근무</button>
                                <button type="button" class="flex-1 py-2.5 rounded-lg text-sm font-bold text-primary/60">상주 근무</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Condition Section -->
            <section class="bg-white rounded-3xl border border-border/50 shadow-sm p-8 space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-8 h-8 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">💰</span>
                    <h3 class="text-lg font-bold text-primary">계약 조건</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2 text-primary/60">예상 예산 <span class="text-primary/30 text-xs font-normal">(VAT 포함)</span></label>
                        <div class="relative">
                            <input type="text" placeholder="예: 8,000,000" class="w-full pl-5 pr-12 py-3.5 rounded-xl border border-border focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-sm font-bold text-right" />
                            <span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-bold text-primary/40">원</span>
                        </div>
                        <p class="text-[11px] text-primary/40 mt-2">전문가와 협의 후 확정 가능합니다.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2 text-primary/60">진행 기간</label>
                        <div class="flex items-center gap-3">
                            <div class="relative flex-1">
                                <input type="number" placeholder="예: 3" class="w-full pl-5 pr-12 py-3.5 rounded-xl border border-border focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-sm font-bold text-right" />
                                <span class="absolute right-5 top-1/2 -translate-y-1/2 text-sm font-bold text-primary/40">개월</span>
                            </div>
                        </div>
                        <p class="text-[11px] text-primary/40 mt-2">시작일: 2024년 6월 중순 협의</p>
                    </div>
                </div>
            </section>

            <!-- Requirements Section -->
            <section class="bg-white rounded-3xl border border-border/50 shadow-sm p-8 space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-8 h-8 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">⚡</span>
                    <h3 class="text-lg font-bold text-primary">필요 역량</h3>
                </div>

                <div>
                    <label class="block text-sm font-bold text-primary mb-3">요구 기술 스택 <span class="text-danger">*</span></label>
                    <div class="p-3 border border-border bg-white rounded-xl focus-within:border-secondary focus-within:ring-2 focus-within:ring-secondary/20 transition-all shadow-sm">
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="px-3 py-1.5 bg-surface border border-border/50 rounded-lg text-xs font-bold text-primary/80 flex items-center gap-2">
                                React <button class="text-primary/30 hover:text-danger">&times;</button>
                            </span>
                            <span class="px-3 py-1.5 bg-surface border border-border/50 rounded-lg text-xs font-bold text-primary/80 flex items-center gap-2">
                                TypeScript <button class="text-primary/30 hover:text-danger">&times;</button>
                            </span>
                            <span class="px-3 py-1.5 bg-surface border border-border/50 rounded-lg text-xs font-bold text-primary/80 flex items-center gap-2">
                                Next.js <button class="text-primary/30 hover:text-danger">&times;</button>
                            </span>
                        </div>
                        <input type="text" placeholder="기술 스택을 입력하고 Enter를 누르세요" class="w-full px-2 py-1.5 bg-transparent outline-none text-sm placeholder:text-primary/30 font-medium" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-primary mb-3">상세 업무 설명 <span class="text-danger">*</span></label>
                    <textarea rows="8" placeholder="전문가에게 전달할 상세한 업무 범위, 요구사항, 참고 사항 등을 자유롭게 작성해주세요." class="w-full px-5 py-4 rounded-xl border border-border focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-sm font-medium resize-none bg-white"></textarea>
                </div>
            </section>

            <!-- File Upload Section -->
            <section class="bg-white rounded-3xl border border-border/50 shadow-sm p-8 space-y-6">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-8 h-8 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">📎</span>
                    <h3 class="text-lg font-bold text-primary">참조 파일</h3>
                </div>

                <div class="border-2 border-dashed border-border/70 rounded-2xl p-10 text-center hover:bg-surface hover:border-secondary/50 transition-colors cursor-pointer bg-surface/30">
                    <span class="text-4xl mb-3 block">📄</span>
                    <h4 class="font-bold text-primary text-sm mb-1">RFP 또는 상세 기획서 업로드</h4>
                    <p class="text-xs font-medium text-primary/50">PDF, PPTX, DOCX (최대 50MB)</p>
                </div>
            </section>

            <!-- Bottom Actions -->
            <div class="flex items-center justify-center gap-4 pt-10">
                <button type="button" class="px-12 py-4 rounded-xl border border-border font-bold text-primary/70 hover:bg-white transition-all">취소</button>
                <button type="button" class="px-16 py-4 rounded-xl bg-secondary text-white font-bold shadow-xl hover:bg-amber-900 hover:-translate-y-1 transition-all">공고 등록 완료</button>
            </div>
        </form>
    </main>

    <!-- Footer Space -->
    <div class="h-24"></div>

</body>
</html>
