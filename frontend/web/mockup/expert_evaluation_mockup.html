<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전문가 평가 - Linker Mockup</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#451A03',
                        secondary: '#B45309',
                        accent: '#FDE68A',
                        background: '#FFFBEB',
                        surface: '#FFF8F0',
                        border: '#D6C4A8',
                        success: '#166534',
                        warning: '#D97706',
                        danger: '#991B1B',
                        info: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* Custom Star Rating CSS for mockup */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            color: #D6C4A8; /* border color as default */
            font-size: 2rem;
            padding: 0 0.1em;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #FDE68A; /* accent color */
            text-shadow: 0 0 5px rgba(253, 230, 138, 0.5);
        }
    </style>
</head>
<body class="bg-background font-sans text-primary min-h-screen flex items-center justify-center p-4 md:p-8">

    <main class="w-full max-w-3xl bg-surface rounded-3xl shadow-xl overflow-hidden border border-border/50">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-primary to-secondary p-8 text-white relative overflow-hidden">
            <div class="relative z-10 flex items-center gap-4">
                <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30 shadow-inner">
                    <span class="text-3xl">⭐</span>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold mb-1 tracking-tight">전문가 평가</h1>
                    <p class="text-amber-100 text-sm md:text-base">프로젝트 완료 후 소중한 피드백을 남겨주세요.</p>
                </div>
            </div>
            <!-- Decorative shapes -->
            <div class="absolute -top-10 -right-10 w-48 h-48 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>
        </header>

        <!-- Content -->
        <div class="p-8 md:p-10 bg-white">
            
            <!-- Project & Expert Context -->
            <div class="flex flex-col md:flex-row items-center gap-6 p-6 bg-surface/50 border border-border/50 rounded-2xl mb-8">
                <div class="w-20 h-20 bg-amber-200 rounded-full flex items-center justify-center flex-shrink-0 shadow-sm border-2 border-white text-3xl">
                    👨‍💻
                </div>
                <div class="flex-1 text-center md:text-left">
                    <div class="inline-block px-3 py-1 bg-secondary/10 text-secondary text-xs font-bold rounded-full mb-2">프론트엔드 개발자</div>
                    <h2 class="text-xl font-bold text-primary mb-1">홍길동 전문가</h2>
                    <p class="text-sm text-primary/60 font-medium">참여 프로젝트: [Linker] 신규 플랫폼 구축 프로젝트</p>
                </div>
            </div>

            <form action="#" class="space-y-8">
                
                <!-- Rating Section -->
                <div>
                    <h3 class="text-lg font-bold text-primary mb-4 border-b border-border/50 pb-2">평가 항목</h3>
                    
                    <div class="space-y-6">
                        <!-- Rating 1 -->
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 p-4 rounded-xl hover:bg-surface/30 transition-colors">
                            <div>
                                <h4 class="font-bold text-primary">전문성 및 기술력</h4>
                                <p class="text-xs text-primary/60 mt-1">업무에 필요한 지식과 기술을 충분히 갖추었나요?</p>
                            </div>
                            <div class="star-rating">
                                <input type="radio" id="tech5" name="tech" value="5" /><label for="tech5" title="매우 우수">★</label>
                                <input type="radio" id="tech4" name="tech" value="4" /><label for="tech4" title="우수">★</label>
                                <input type="radio" id="tech3" name="tech" value="3" /><label for="tech3" title="보통">★</label>
                                <input type="radio" id="tech2" name="tech" value="2" /><label for="tech2" title="미흡">★</label>
                                <input type="radio" id="tech1" name="tech" value="1" /><label for="tech1" title="매우 미흡">★</label>
                            </div>
                        </div>

                        <!-- Rating 2 -->
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 p-4 rounded-xl hover:bg-surface/30 transition-colors">
                            <div>
                                <h4 class="font-bold text-primary">일정 준수</h4>
                                <p class="text-xs text-primary/60 mt-1">약속된 기한 내에 결과물을 산출하였나요?</p>
                            </div>
                            <div class="star-rating">
                                <input type="radio" id="time5" name="time" value="5" /><label for="time5" title="매우 우수">★</label>
                                <input type="radio" id="time4" name="time" value="4" /><label for="time4" title="우수">★</label>
                                <input type="radio" id="time3" name="time" value="3" /><label for="time3" title="보통">★</label>
                                <input type="radio" id="time2" name="time" value="2" /><label for="time2" title="미흡">★</label>
                                <input type="radio" id="time1" name="time" value="1" /><label for="time1" title="매우 미흡">★</label>
                            </div>
                        </div>

                        <!-- Rating 3 -->
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 p-4 rounded-xl hover:bg-surface/30 transition-colors">
                            <div>
                                <h4 class="font-bold text-primary">커뮤니케이션</h4>
                                <p class="text-xs text-primary/60 mt-1">원활한 소통과 협업이 이루어졌나요?</p>
                            </div>
                            <div class="star-rating">
                                <input type="radio" id="comm5" name="comm" value="5" /><label for="comm5" title="매우 우수">★</label>
                                <input type="radio" id="comm4" name="comm" value="4" /><label for="comm4" title="우수">★</label>
                                <input type="radio" id="comm3" name="comm" value="3" /><label for="comm3" title="보통">★</label>
                                <input type="radio" id="comm2" name="comm" value="2" /><label for="comm2" title="미흡">★</label>
                                <input type="radio" id="comm1" name="comm" value="1" /><label for="comm1" title="매우 미흡">★</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Feedback Textarea -->
                <div>
                    <h3 class="text-lg font-bold text-primary mb-4 border-b border-border/50 pb-2">종합 피드백</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-primary/80 mb-2">강점 (Good)</label>
                            <textarea rows="3" placeholder="전문가의 뛰어난 점이나 좋았던 경험을 작성해주세요." class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-success focus:ring-2 focus:ring-success/20 outline-none transition-all placeholder:text-primary/30 resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-primary/80 mb-2">개선점 (Improvement)</label>
                            <textarea rows="3" placeholder="아쉬웠던 점이나 개선이 필요한 부분을 작성해주세요." class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-warning focus:ring-2 focus:ring-warning/20 outline-none transition-all placeholder:text-primary/30 resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Rehire Intent -->
                <div class="bg-surface/50 p-5 rounded-2xl border border-border/50">
                    <p class="text-sm font-bold text-primary mb-3">다음 프로젝트에서도 이 전문가와 함께 일하시겠습니까?</p>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="rehire" class="peer sr-only" value="yes" />
                            <div class="text-center px-4 py-3 border border-border rounded-xl peer-checked:bg-success/10 peer-checked:border-success peer-checked:text-success font-bold text-primary/60 transition-all shadow-sm peer-hover:bg-white">
                                👍 네, 추천합니다
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="rehire" class="peer sr-only" value="no" />
                            <div class="text-center px-4 py-3 border border-border rounded-xl peer-checked:bg-danger/10 peer-checked:border-danger peer-checked:text-danger font-bold text-primary/60 transition-all shadow-sm peer-hover:bg-white">
                                👎 아니요
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="pt-4 flex gap-4">
                    <button type="button" class="px-6 py-3 rounded-xl border border-border font-bold text-primary/70 hover:bg-surface transition-colors">
                        취소
                    </button>
                    <button type="button" class="flex-1 px-6 py-3 rounded-xl bg-primary text-white font-bold hover:bg-amber-900 shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
                        평가 제출하기
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
