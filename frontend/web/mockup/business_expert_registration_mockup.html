<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전문가 직접 등록 - Linker Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#451A03',
                        secondary: '#B45309',
                        accent: '#FDE68A',
                        background: '#FFFBEB',
                        surface: '#FFF8F0',
                        border: '#D6C4A8',
                        success: '#166534',
                        warning: '#D97706',
                        danger: '#991B1B',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body class="bg-background font-sans text-primary min-h-screen">
    
    <!-- Header -->
    <header class="bg-surface border-b border-border/50 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="expert_registration_mockup.html" class="text-primary/50 hover:text-primary transition-colors text-xl font-bold">←</a>
                <h1 class="text-lg font-bold text-primary">전문가 직접 등록</h1>
            </div>
            <div class="flex items-center gap-3">
                <button class="px-6 py-2 rounded-xl bg-primary text-white text-sm font-bold shadow-md hover:bg-black transition-all">인력 풀에 저장</button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto py-10 px-6 space-y-10">
        
        <!-- Section 1: AI Resume Parsing -->
        <div class="bg-white p-8 rounded-[40px] border border-border/50 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 right-0 px-4 py-1 bg-secondary text-white text-[9px] font-black uppercase tracking-widest">AI Power</div>
            <h2 class="text-lg font-black mb-4 flex items-center gap-2">
                <span class="text-secondary text-xl">📁</span> 이력서 파일로 자동 등록
            </h2>
            <div class="border-2 border-dashed border-border/60 rounded-3xl p-10 text-center hover:bg-surface/50 transition-all cursor-pointer group bg-surface/20">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm group-hover:scale-110 transition-transform">📄</div>
                <p class="text-sm font-bold text-primary">이력서(PDF, Word)를 이곳에 끌어다 놓으세요</p>
                <p class="text-xs text-primary/40 mt-1 font-medium italic">AI가 이름, 경력, 기술 스택을 자동으로 분석하여 아래 폼을 채워줍니다.</p>
                <button type="button" class="mt-6 px-6 py-2.5 bg-primary text-white text-xs font-bold rounded-xl shadow-md">내 PC에서 파일 선택</button>
            </div>
        </div>

        <div class="flex items-center gap-4 py-2">
            <div class="h-px bg-border/30 flex-1"></div>
            <span class="text-[10px] font-bold text-primary/30 uppercase tracking-widest">or manual input</span>
            <div class="h-px bg-border/30 flex-1"></div>
        </div>

        <!-- Section 2: Manual Data Entry -->
        <form class="space-y-8">
            <!-- Basic Profile -->
            <div class="bg-white p-8 rounded-[40px] border border-border/50 shadow-sm space-y-6">
                <h3 class="text-sm font-black text-primary uppercase tracking-widest border-b border-border/20 pb-2">기본 프로필 정보</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">성명 (Full Name)</label>
                        <input type="text" placeholder="이름을 입력하세요" class="w-full px-5 py-3 rounded-xl border border-border focus:border-secondary outline-none text-sm font-medium bg-surface/30" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">연락처 (Phone)</label>
                        <input type="tel" placeholder="010-0000-0000" class="w-full px-5 py-3 rounded-xl border border-border focus:border-secondary outline-none text-sm font-medium bg-surface/30" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">이메일 주소 (Email)</label>
                        <input type="email" placeholder="example@email.com" class="w-full px-5 py-3 rounded-xl border border-border focus:border-secondary outline-none text-sm font-medium bg-surface/30" />
                    </div>
                </div>
            </div>

            <!-- Professional Expertise -->
            <div class="bg-white p-8 rounded-[40px] border border-border/50 shadow-sm space-y-6">
                <h3 class="text-sm font-black text-primary uppercase tracking-widest border-b border-border/20 pb-2">전문 분야 및 기술</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">주요 직무</label>
                        <div class="flex flex-wrap gap-2">
                            <button type="button" class="px-4 py-2 rounded-xl border border-secondary bg-secondary/5 text-xs font-bold text-secondary">AA</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/40">TA</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/40">DA</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/40">Dev PL</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/40">FE</button>
                            <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/40">BE</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">핵심 기술 스택</label>
                        <div class="p-3 border border-border rounded-xl bg-surface/30 flex flex-wrap gap-2 min-h-[50px]">
                            <span class="px-2 py-1 bg-white border border-border/50 rounded text-xs font-bold text-primary/80 flex items-center gap-1">
                                Spring Boot <button class="text-primary/20">&times;</button>
                            </span>
                            <span class="px-2 py-1 bg-white border border-border/50 rounded text-xs font-bold text-primary/80 flex items-center gap-1">
                                AWS <button class="text-primary/20">&times;</button>
                            </span>
                            <input type="text" placeholder="직접 입력..." class="flex-1 bg-transparent outline-none text-xs font-medium" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-primary/60 mb-2 uppercase">수행 가능 최소 금액 (월 기준)</label>
                        <div class="flex items-center gap-2">
                            <input type="number" placeholder="700" class="w-32 px-5 py-3 rounded-xl border border-border focus:border-secondary outline-none text-sm font-bold bg-surface/30 text-right" />
                            <span class="text-sm font-bold text-primary/60">만원 이상</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Career Registration -->
            <div class="bg-white p-8 rounded-[40px] border border-border/50 shadow-sm space-y-6">
                <div class="flex items-center justify-between border-b border-border/20 pb-2">
                    <h3 class="text-sm font-black text-primary uppercase tracking-widest">핵심 경력 사항</h3>
                    <button type="button" class="text-[11px] font-bold text-secondary">+ 경력 행 추가</button>
                </div>
                
                <div class="space-y-4">
                    <div class="p-5 bg-surface/50 rounded-2xl border border-border/30 relative">
                        <button class="absolute top-4 right-4 text-primary/20">&times;</button>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-primary/40 uppercase mb-1">프로젝트명 / 회사</label>
                                <input type="text" value="차세대 물류 시스템 구축 / 삼성SDS" class="w-full bg-transparent font-bold text-sm text-primary outline-none focus:text-secondary" />
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-primary/40 uppercase mb-1">수행 기간</label>
                                <p class="text-xs font-medium">2022.01 ~ 2023.12</p>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-primary/40 uppercase mb-1">역할</label>
                                <p class="text-xs font-medium text-secondary font-bold">AA (App Architect)</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-center gap-4 pt-4">
                <button type="button" class="px-10 py-3 rounded-xl border border-border font-bold text-primary/50 hover:bg-white transition-all text-sm">취소</button>
                <button type="button" class="px-12 py-3 rounded-xl bg-primary text-white font-bold shadow-xl hover:bg-black transition-all text-sm">전문가 정보 저장 및 소싱 목록 추가</button>
            </div>
        </form>
    </main>

    <div class="h-20"></div>

</body>
</html>
