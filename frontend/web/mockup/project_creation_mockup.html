<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 프로젝트 등록 - Linker Mockup</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#451A03',
                        secondary: '#B45309',
                        accent: '#FDE68A',
                        background: '#FFFBEB',
                        surface: '#FFF8F0',
                        border: '#D6C4A8',
                        success: '#166534',
                        warning: '#D97706',
                        danger: '#991B1B',
                        info: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body class="bg-background font-sans text-primary min-h-screen p-4 md:p-8 flex justify-center items-start">

    <main class="w-full max-w-5xl bg-surface rounded-3xl shadow-xl border border-border/50 overflow-hidden flex flex-col md:flex-row">
        
        <!-- Left Side: Progress / Steps -->
        <aside class="md:w-1/3 bg-primary text-white p-10 flex flex-col relative overflow-hidden">
            <div class="relative z-10 flex-1">
                <button class="w-10 h-10 rounded-xl bg-white/10 hover:bg-white/20 flex items-center justify-center backdrop-blur-sm transition-colors border border-white/20 mb-10">
                    &larr;
                </button>
                
                <h1 class="text-3xl font-bold mb-2 tracking-tight">새 프로젝트 등록</h1>
                <p class="text-amber-200/80 mb-10 text-sm">성공적인 비즈니스를 위한 첫 걸음</p>

                <!-- Steps Navigation -->
                <div class="space-y-6">
                    <div class="flex items-start gap-4">
                        <div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center font-bold shadow-sm flex-shrink-0 border-2 border-white">
                            1
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-lg">기본 정보</h3>
                            <p class="text-xs text-amber-200/60 mt-1">프로젝트명, 기간 및 예산</p>
                        </div>
                    </div>
                    
                    <div class="w-0.5 h-6 bg-white/20 ml-4 -my-4"></div>

                    <div class="flex items-start gap-4 opacity-50">
                        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center font-bold flex-shrink-0">
                            2
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-lg">모집 분야</h3>
                            <p class="text-xs text-white/60 mt-1">필요 인력 및 요구 스택</p>
                        </div>
                    </div>

                    <div class="w-0.5 h-6 bg-white/20 ml-4 -my-4"></div>

                    <div class="flex items-start gap-4 opacity-50">
                        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center font-bold flex-shrink-0">
                            3
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-lg">상세 내용</h3>
                            <p class="text-xs text-white/60 mt-1">프로젝트 배경 및 첨부파일</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Decor -->
            <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-white/5 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute top-0 -right-20 w-64 h-64 bg-secondary/30 rounded-full blur-3xl pointer-events-none"></div>
        </aside>

        <!-- Right Side: Form (Step 1 View) -->
        <section class="md:w-2/3 bg-white p-10 py-12 relative flex flex-col min-h-[600px]">
            
            <!-- Step Header -->
            <div class="mb-8 pb-4 border-b border-border/40">
                <h2 class="text-2xl font-bold text-primary flex items-center gap-2">
                    <span class="text-secondary text-xl">📄</span> Step 1. 프로젝트 기본 정보
                </h2>
                <p class="text-sm text-primary/60 mt-2">프로젝트의 핵심 정보를 입력해주세요.</p>
            </div>

            <form action="#" class="space-y-6 flex-1">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2">발주사(클라이언트) <span class="text-danger">*</span></label>
                        <input type="text" placeholder="예: (주)대한상사" class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all placeholder:text-primary/30 font-medium" />
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2">프로젝트명 <span class="text-danger">*</span></label>
                        <input type="text" placeholder="예: 차세대 B2B 구매 시스템 구축" class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all placeholder:text-primary/30 font-medium" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-primary mb-2">프로젝트 주요 범위 <span class="text-danger">*</span></label>
                    <textarea rows="4" placeholder="프로젝트에서 구현해야 할 핵심 기능이나 사업 범위를 상세히 입력해주세요." class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all placeholder:text-primary/30 font-medium resize-none"></textarea>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-sm font-bold text-primary">전체 프로젝트 기술 스택 <span class="text-danger">*</span></label>
                        <span class="text-[10px] font-bold text-primary/30 uppercase tracking-widest">Global Stack</span>
                    </div>
                    <div class="p-3 border border-border bg-surface/50 rounded-xl focus-within:bg-white focus-within:border-secondary focus-within:ring-2 focus-within:ring-secondary/20 transition-all shadow-sm">
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="px-2.5 py-1 bg-white border border-border/50 rounded-lg text-xs font-bold text-primary/80 flex items-center gap-1.5 shadow-sm">
                                Spring Boot <button type="button" class="text-primary/20 hover:text-danger">&times;</button>
                            </span>
                            <span class="px-2.5 py-1 bg-white border border-border/50 rounded-lg text-xs font-bold text-primary/80 flex items-center gap-1.5 shadow-sm">
                                MySQL <button type="button" class="text-primary/20 hover:text-danger">&times;</button>
                            </span>
                        </div>
                        <input type="text" placeholder="공통 기술 스택 입력 (예: Java, AWS, Docker)" class="w-full px-1 py-1 bg-transparent outline-none text-sm placeholder:text-primary/30 font-medium" />
                    </div>
                    <p class="text-[10px] text-primary/40 mt-2 font-medium">이곳에 등록한 기술은 모든 모집 분야에 공통으로 적용됩니다.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2">카테고리 <span class="text-danger">*</span></label>
                        <select class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all appearance-none text-primary font-medium cursor-pointer">
                            <option value="" disabled selected>선택해주세요</option>
                            <option>웹/시스템 개발</option>
                            <option>모바일 앱 개발</option>
                            <option>UI/UX 디자인</option>
                            <option>기획/컨설팅</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-primary mb-2">예상 예산 (원) <span class="text-danger">*</span></label>
                        <input type="text" placeholder="예: 50,000,000" class="w-full px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all placeholder:text-primary/30 font-medium" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-primary mb-2">프로젝트 기간 <span class="text-danger">*</span></label>
                    <div class="flex items-center gap-4">
                        <input type="date" class="flex-1 px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-primary font-medium" />
                        <span class="text-primary/50 font-bold">~</span>
                        <input type="date" class="flex-1 px-4 py-3 rounded-xl border border-border bg-surface/50 focus:bg-white focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all text-primary font-medium" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-primary mb-2">근무 형태</label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="workType" class="peer sr-only" value="remote" checked />
                            <div class="text-center px-4 py-3 border border-border rounded-xl peer-checked:bg-secondary/10 peer-checked:border-secondary peer-checked:text-secondary font-bold text-primary/60 transition-all shadow-sm peer-hover:bg-surface">
                                🏠 100% 원격
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="workType" class="peer sr-only" value="office" />
                            <div class="text-center px-4 py-3 border border-border rounded-xl peer-checked:bg-secondary/10 peer-checked:border-secondary peer-checked:text-secondary font-bold text-primary/60 transition-all shadow-sm peer-hover:bg-surface">
                                🏢 상주 (출근)
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="workType" class="peer sr-only" value="hybrid" />
                            <div class="text-center px-4 py-3 border border-border rounded-xl peer-checked:bg-secondary/10 peer-checked:border-secondary peer-checked:text-secondary font-bold text-primary/60 transition-all shadow-sm peer-hover:bg-surface">
                                🤝 하이브리드
                            </div>
                        </label>
                    </div>
                </div>

            </form>

            <!-- Bottom Navigation -->
            <div class="pt-8 mt-8 border-t border-border/40 flex justify-between items-center">
                <button type="button" class="px-6 py-3 rounded-xl font-bold text-primary/50 hover:text-primary transition-colors">
                    임시 저장
                </button>
                <button type="button" class="px-10 py-3 rounded-xl bg-primary text-white font-bold hover:bg-amber-900 shadow-md hover:shadow-lg transition-all active:scale-[0.98] flex items-center gap-2">
                    다음 단계 <span class="text-lg leading-none">&rarr;</span>
                </button>
            </div>
            
        </section>

    </main>

</body>
</html>
