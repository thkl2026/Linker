<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 프로젝트 등록 (Step 2) - Linker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#451A03',
                        secondary: '#B45309',
                        accent: '#FDE68A',
                        background: '#FFFBEB',
                        surface: '#FFF8F0',
                        border: '#D6C4A8',
                        success: '#166534',
                        warning: '#D97706',
                        danger: '#991B1B',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body class="bg-background font-sans text-primary min-h-screen p-4 md:p-8 flex justify-center items-start">

    <main class="w-full max-w-5xl bg-surface rounded-3xl shadow-xl border border-border/50 overflow-hidden flex flex-col md:flex-row">
        
        <!-- Left Side: Progress -->
        <aside class="md:w-1/3 bg-primary text-white p-10 flex flex-col relative overflow-hidden">
            <div class="relative z-10 flex-1">
                <a href="project_creation_mockup.html" class="w-10 h-10 rounded-xl bg-white/10 hover:bg-white/20 flex items-center justify-center backdrop-blur-sm transition-colors border border-white/20 mb-10">
                    &larr;
                </a>
                
                <h1 class="text-3xl font-bold mb-2 tracking-tight">새 프로젝트 등록</h1>
                <p class="text-amber-200/80 mb-10 text-sm font-medium">최적의 전문가 팀을 구성해보세요.</p>

                <!-- Steps -->
                <div class="space-y-8">
                    <div class="flex items-start gap-4 opacity-50">
                        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center font-bold flex-shrink-0 text-xs">1</div>
                        <div>
                            <p class="font-bold text-sm">기본 정보 입력</p>
                            <p class="text-[11px] text-white/60 mt-1">프로젝트 명칭 및 개요</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-4 relative">
                        <div class="absolute left-4 top-8 bottom-[-32px] w-0.5 bg-secondary/30"></div>
                        <div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center font-bold shadow-lg flex-shrink-0 text-xs z-10">2</div>
                        <div>
                            <p class="font-bold text-sm">모집 상세 구성</p>
                            <p class="text-[11px] text-amber-200 mt-1 font-bold">모집 분야 및 기술 스택</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-4 opacity-30">
                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-bold flex-shrink-0 text-xs">3</div>
                        <div>
                            <p class="font-bold text-sm">최종 검토 및 등록</p>
                            <p class="text-[11px] text-white/60 mt-1">배경 정보 및 공고 게시</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-white/5 rounded-full blur-3xl pointer-events-none"></div>
        </aside>

        <!-- Right Side: Form -->
        <section class="md:w-2/3 bg-white p-10 py-12 relative flex flex-col min-h-[700px]">
            
            <div class="mb-8 pb-4 border-b border-border/40">
                <h2 class="text-2xl font-bold text-primary flex items-center gap-2">
                    <span class="text-secondary text-xl">👥</span> Step 2. 모집 상세 구성
                </h2>
                <p class="text-sm text-primary/60 mt-2">필요한 전문가의 역할과 요구 역량을 정의합니다.</p>
            </div>

            <form class="space-y-8 flex-1">
                
                <!-- Quick Role Selector -->
                <div>
                    <label class="block text-sm font-bold text-primary mb-3">빠른 역할 추가</label>
                    <div class="flex flex-wrap gap-2">
                        <button type="button" class="px-4 py-2 rounded-xl border border-secondary/20 bg-secondary/5 text-xs font-bold text-secondary hover:bg-secondary hover:text-white transition-all">+ AA (App Architect)</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-secondary/20 bg-secondary/5 text-xs font-bold text-secondary hover:bg-secondary hover:text-white transition-all">+ TA (Tech Architect)</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-secondary/20 bg-secondary/5 text-xs font-bold text-secondary hover:bg-secondary hover:text-white transition-all">+ SA (Solution Architect)</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-secondary/20 bg-secondary/5 text-xs font-bold text-secondary hover:bg-secondary hover:text-white transition-all">+ DA (Data Architect)</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/60 hover:bg-primary hover:text-white transition-all">+ 클라우드 전문가</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/60 hover:bg-primary hover:text-white transition-all">+ 개발 PL</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/60 hover:bg-primary hover:text-white transition-all">+ FE 개발</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-border bg-surface text-xs font-bold text-primary/60 hover:bg-primary hover:text-white transition-all">+ BE 개발</button>
                        <button type="button" class="px-4 py-2 rounded-xl border border-dashed border-border/60 text-xs font-bold text-primary/30 hover:text-primary transition-all">...직접 추가</button>
                    </div>
                </div>

                <!-- Expert Requirements Table -->
                <div class="bg-white border border-border/40 rounded-3xl overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-primary text-white text-[10px] font-black uppercase tracking-widest">
                            <tr>
                                <th class="py-4 px-6 w-1/4">모집 분야</th>
                                <th class="py-4 px-6 w-20 text-center">인원</th>
                                <th class="py-4 px-6 w-32">경력 수준</th>
                                <th class="py-4 px-6">필수 기술 및 주요 R&R</th>
                                <th class="py-4 px-6 w-10"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-border/10">
                            <!-- Row 1: AA -->
                            <tr class="group hover:bg-surface/30 transition-colors">
                                <td class="py-5 px-6">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center font-black text-[10px] text-amber-900 shadow-sm">AA</div>
                                        <div>
                                            <input type="text" value="App Architect" class="bg-transparent font-bold text-sm text-primary outline-none focus:text-secondary w-full" />
                                            <p class="text-[10px] text-primary/40 font-medium">Application Architecture</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-5 px-6">
                                    <div class="flex items-center justify-center border border-border/40 rounded-lg bg-white overflow-hidden shadow-sm">
                                        <button type="button" class="px-2 py-1 hover:bg-gray-50 text-primary/40 font-bold">-</button>
                                        <input type="number" value="1" class="w-8 text-center text-xs font-bold outline-none" />
                                        <button type="button" class="px-2 py-1 hover:bg-gray-50 text-primary/40 font-bold">+</button>
                                    </div>
                                </td>
                                <td class="py-5 px-6">
                                    <select class="bg-transparent text-xs font-bold text-primary/70 outline-none w-full cursor-pointer">
                                        <option>주니어 (1~3년)</option>
                                        <option>미들 (3~7년)</option>
                                        <option selected>시니어 (7년~)</option>
                                    </select>
                                </td>
                                <td class="py-5 px-6">
                                    <div class="space-y-2">
                                        <div class="flex flex-wrap gap-1.5">
                                            <span class="px-2 py-1 bg-white border border-border/50 rounded-md text-[10px] font-bold text-primary/60">Spring Cloud</span>
                                            <span class="px-2 py-1 bg-white border border-border/50 rounded-md text-[10px] font-bold text-primary/60">MSA</span>
                                        </div>
                                        <input type="text" placeholder="핵심 역할 입력 (예: 전체 시스템 설계 및 표준화)" class="w-full bg-transparent text-[11px] font-medium text-primary/40 outline-none focus:text-primary" />
                                    </div>
                                </td>
                                <td class="py-5 px-6 text-right">
                                    <button type="button" class="text-primary/20 hover:text-danger opacity-0 group-hover:opacity-100 transition-all font-bold text-lg">&times;</button>
                                </td>
                            </tr>

                            <!-- Row 2: Dev PL -->
                            <tr class="group hover:bg-surface/30 transition-colors">
                                <td class="py-5 px-6">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center font-black text-[10px] text-blue-900 shadow-sm">PL</div>
                                        <div>
                                            <input type="text" value="개발 PL" class="bg-transparent font-bold text-sm text-primary outline-none focus:text-secondary w-full" />
                                            <p class="text-[10px] text-primary/40 font-medium">Project Leader</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-5 px-6">
                                    <div class="flex items-center justify-center border border-border/40 rounded-lg bg-white overflow-hidden shadow-sm">
                                        <button type="button" class="px-2 py-1 hover:bg-gray-50 text-primary/40 font-bold">-</button>
                                        <input type="number" value="1" class="w-8 text-center text-xs font-bold outline-none" />
                                        <button type="button" class="px-2 py-1 hover:bg-gray-50 text-primary/40 font-bold">+</button>
                                    </div>
                                </td>
                                <td class="py-5 px-6">
                                    <select class="bg-transparent text-xs font-bold text-primary/70 outline-none w-full cursor-pointer">
                                        <option>주니어 (1~3년)</option>
                                        <option selected>미들 (3~7년)</option>
                                        <option>시니어 (7년~)</option>
                                    </select>
                                </td>
                                <td class="py-5 px-6">
                                    <div class="space-y-2">
                                        <div class="flex flex-wrap gap-1.5">
                                            <span class="px-2 py-1 bg-white border border-border/50 rounded-md text-[10px] font-bold text-primary/60">Agile</span>
                                            <span class="px-2 py-1 bg-white border border-border/50 rounded-md text-[10px] font-bold text-primary/60">Jira</span>
                                        </div>
                                        <input type="text" placeholder="핵심 역할 입력 (예: 개발팀 매니지먼트 및 코드 리뷰)" class="w-full bg-transparent text-[11px] font-medium text-primary/40 outline-none focus:text-primary" />
                                    </div>
                                </td>
                                <td class="py-5 px-6 text-right">
                                    <button type="button" class="text-primary/20 hover:text-danger opacity-0 group-hover:opacity-100 transition-all font-bold text-lg">&times;</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </form>

            <!-- Navigation Buttons -->
            <div class="pt-8 mt-8 border-t border-border/40 flex justify-between items-center">
                <a href="project_creation_mockup.html" class="px-8 py-3.5 rounded-xl font-bold text-primary/40 hover:text-primary transition-colors text-sm">
                    이전 단계로
                </a>
                <button type="button" class="px-10 py-3.5 rounded-xl bg-primary text-white font-bold hover:bg-amber-900 shadow-md hover:shadow-lg transition-all active:scale-[0.98] flex items-center gap-2 text-sm">
                    다음 단계 (3/3) &rarr;
                </button>
            </div>

        </section>
    </main>

    <div class="h-20"></div>

</body>
</html>
