spring:
  profiles:
    active: ${SPRING_PROFILE:local}
  application:
    name: linker
  threads:
    virtual:
      enabled: true   # Java 21 Virtual Thread
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      timeout: 3000ms

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    kr.co.linker: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

linker:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 1800         # 30遺?(珥?
    refresh-token-expiry: 604800      # 7??(珥?
  mfa:
    totp-issuer: "Linker"
    otp-expiry-seconds: 300
  rate-limit:
    login-max-attempts: 5
    login-lock-minutes: 30
  file:
    presigned-upload-expiry-seconds: 300
    presigned-download-expiry-seconds: 900
    max-size-mb: 20
  ai:
    llm-model: ${LLM_MODEL_NAME:gemini-1.5-flash}
    gemini-api-key: ${GEMINI_API_KEY:}
  nice:
    api-url: ${NICE_API_URL:}
    client-id: ${NICE_CLIENT_ID:}
    client-secret: ${NICE_CLIENT_SECRET:}
  encryption:
    key: ${ENCRYPTION_KEY}
  fcm:
    service-account-key: ${FCM_SERVICE_ACCOUNT_KEY:classpath:firebase-service-account.json}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  app:
    base-url: ${APP_BASE_URL:http://localhost:5173}
