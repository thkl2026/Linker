# 내부 서버 운영 환경 설정
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/linker
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 20
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:dummy}
    password: ${MAIL_PASSWORD:dummy}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

linker:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:linker-files}
  clamav:
    host: ${CLAMAV_HOST}
    port: ${CLAMAV_PORT:3310}
    timeout-ms: ${CLAMAV_TIMEOUT_MS:10000}
  queue:
    type: memory
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  app:
    base-url: ${APP_BASE_URL:http://localhost:8080}

management:
  health:
    mail:
      enabled: false

